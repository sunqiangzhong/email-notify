# ============================================
# Mul-Email 本地构建版本
# ============================================
# 使用方式: docker-compose -f docker-compose.local.yml up -d --build
# ============================================

version: '3.8'

services:
  mul-email:
    build:
      context: .
      dockerfile: Dockerfile
    image: mul-email:latest
    container_name: mul-email
    restart: unless-stopped
    ports:
      - "${APP_PORT:-6000}:80"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-here}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123456}
      - DATA_DIR=/app/server/data
      - TZ=Asia/Shanghai
      # IMAP IDLE 模式配置
      - SAFETY_POLL_INTERVAL=${SAFETY_POLL_INTERVAL:-300000}
      - IDLE_REISSUE_INTERVAL=${IDLE_REISSUE_INTERVAL:-1740000}
      - RECONNECT_BASE_DELAY=${RECONNECT_BASE_DELAY:-30000}
    volumes:
      - mul-email-data:/app/server/data
    networks:
      - mul-email-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mul-email-data:
    driver: local

networks:
  mul-email-net:
    driver: bridge
