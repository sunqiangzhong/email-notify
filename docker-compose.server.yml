services:
  mysql:
    image: registry.cn-hangzhou.aliyuncs.com/library/mysql:8.0
    container_name: mul-email-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=mul_email_pass
      - MYSQL_DATABASE=mul_email
      - TZ=Asia/Shanghai
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=100
    volumes:
      - /vol1/1000/docker/mul-email/mysql:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - mul-email-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmul_email_pass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mul-email:
    image: sunqz/mul-email:latest
    container_name: mul-email
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5111:80"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - JWT_SECRET=your_random_secret_key_here
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
      - DATA_DIR=/app/server/data
      - TZ=Asia/Shanghai
      # MySQL 连接配置（容器内用 mysql 作为 host）
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=mul_email_pass
      - MYSQL_DATABASE=mul_email
    volumes:
      - /vol1/1000/docker/mul-email/data:/app/server/data
    networks:
      - mul-email-net

networks:
  mul-email-net:
    driver: bridge
