# ============================================
# Mul-Email 多邮箱聚合与通知管理系统
# ============================================
# 使用方式:
#   方式1: 直接拉取镜像运行 (推荐)
#          docker-compose up -d
#
#   方式2: 本地构建运行
#          docker-compose -f docker-compose.local.yml up -d --build
# ============================================

version: '3.8'

services:
  mul-email:
    image: sunqz/mul-email:1.0.0
    container_name: mul-email
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${APP_PORT:-6000}:80"
    environment:
      - PORT=3001
      - NODE_ENV=production
      # CORS 允许的来源，* 表示允许所有（生产环境建议设置为实际域名）
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-here}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123456}
      - DATA_DIR=/app/server/data
      - TZ=Asia/Shanghai
    volumes:
      - mul-email-data:/app/server/data
    networks:
      - mul-email-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mul-email-data:
    driver: local

networks:
  mul-email-net:
    driver: bridge
