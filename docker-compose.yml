# ============================================
# Mul-Email 多邮箱聚合与通知管理系统 (MySQL)
# ============================================
# 使用方式:
#   docker-compose up -d
# ============================================

version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mul-email-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-mul_email_pass}
      - MYSQL_DATABASE=mul_email
      - MYSQL_CHARSET=utf8mb4
      - TZ=Asia/Shanghai
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=100
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    networks:
      - mul-email-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-mul_email_pass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mul-email:
    image: sunqz/mul-email:1.0.0
    container_name: mul-email
    pull_policy: always
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${APP_PORT:-6000}:80"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-here}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123456}
      - TZ=Asia/Shanghai
      # MySQL
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD:-mul_email_pass}
      - MYSQL_DATABASE=mul_email
      # IMAP IDLE
      - SAFETY_POLL_INTERVAL=${SAFETY_POLL_INTERVAL:-300000}
      - IDLE_REISSUE_INTERVAL=${IDLE_REISSUE_INTERVAL:-1740000}
      - RECONNECT_BASE_DELAY=${RECONNECT_BASE_DELAY:-30000}
    volumes:
      - mul-email-data:/app/server/data
    networks:
      - mul-email-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mysql-data:
    driver: local
  mul-email-data:
    driver: local

networks:
  mul-email-net:
    driver: bridge
