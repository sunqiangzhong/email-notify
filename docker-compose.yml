services:
  email-notify:
    build:
      context: .
      dockerfile: Dockerfile
    image: sunqz/email-notify:latest
    container_name: email-notify-allinone
    restart: unless-stopped
    ports:
      - "5111:80"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - APP_VERSION=1.0.0
      - JWT_SECRET=your_random_secret_key_here
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
      - TZ=Asia/Shanghai
      # API 令牌（用于外部访问，可选）
      - API_TOKEN=
      # MySQL 配置（内置）
      - MYSQL_ROOT_PASSWORD=mul_email_pass
      - MYSQL_PASSWORD=mul_email_pass
      - MYSQL_DATABASE=mul_email
      - MYSQL_HOST=127.0.0.1
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      # IMAP IDLE 配置
      - SAFETY_POLL_INTERVAL=300000
      - IDLE_REISSUE_INTERVAL=1740000
      - RECONNECT_BASE_DELAY=30000
    volumes:
      - /vol1/1000/docker/email-notify/mysql:/var/lib/mysql        # MySQL 数据持久化
      - /vol1/1000/docker/email-notify/data:/app/server/data       # 应用数据持久化
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
