version: '3.8'

services:
  mul-email:
    build:
      context: .
      dockerfile: Dockerfile
    image: mul-email:latest
    container_name: mul-email
    restart: unless-stopped
    ports:
      - "${APP_PORT:-6000}:80"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-mul-email-secret-change-me-in-production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - DATA_DIR=/app/server/data
      - TZ=Asia/Shanghai
    volumes:
      - mul-email-data:/app/server/data
    networks:
      - mul-email-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mul-email-data:
    driver: local

networks:
  mul-email-net:
    driver: bridge
